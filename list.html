<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item Tracker — Items</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <header class="app-header">
      <h1>Item Tracker</h1>
      <p class="subtitle">Your items and running total.</p>
      <nav class="page-nav">
        <a href="index.html">&larr; Add item</a>
        <span class="page-nav-current">Items</span>
      </nav>
    </header>

    <section class="card">
      <h2>Items</h2>
      <table id="item-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Category</th>
            <th class="num">Qty</th>
            <th class="num">Price</th>
            <th class="num">Total</th>
            <th class="num"></th>
          </tr>
        </thead>
        <tbody id="item-rows">
          <!-- rows are built by list-script.js -->
        </tbody>
        <tfoot>
          <tr>
            <td colspan="4">Grand total</td>
            <td class="num" id="grand-total">$0.00</td>
            <td></td>
          </tr>
        </tfoot>
      </table>

      <p class="hint">Items are saved in this browser (localStorage), so anything added on the Add page shows up here too.</p>
    </section>

  </div>

  <script src="list-script.js"></script>
</body>
</html>
